<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR.js NFT - IPF & GIK | KIT</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    .overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      z-index: 1000;
    }
    .status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #e74c3c;
      display: inline-block;
    }
    .dot.on { background: #2ecc71; }
    .bar-wrap {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      background: rgba(0,0,0,0.7);
      border-radius: 8px;
      padding: 6px 12px 8px;
      z-index: 1000;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      text-align: center;
    }
    .bar-track {
      width: 100%; height: 7px;
      background: #333; border-radius: 4px;
      margin-top: 5px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 0%;
      border-radius: 4px; background: #2ecc71;
      transition: width 0.1s, background 0.3s;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <div class="status">
    <span class="dot" id="dot1"></span> IPF
    &nbsp;&nbsp;
    <span class="dot" id="dot2"></span> GIK
    &nbsp;&nbsp;
    <span id="statusMsg">Searching…</span>
  </div>

  <div class="bar-wrap">
    Proximity (threshold 1.0 m)
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
  </div>

  <div id="distanceOverlay" class="overlay">
    Distance: <span id="distValue">--</span> m
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >

    <!-- NFT MARKER 1: IPF — files: IPF.fset IPF.fset3 IPF.iset -->
    <a-nft
      id="nft1"
      type="nft"
      url="IPF"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
      emitevents="true"
    >
      <a-sphere position="0 0.5 0" color="#00FF00"></a-sphere>
      <a-text value="IPF" position="0 1.2 0" align="center" color="#ffffff" width="3"></a-text>
    </a-nft>

    <!-- NFT MARKER 2: GIK — files: GIK.fset GIK.fset3 GIK.iset -->
    <a-nft
      id="nft2"
      type="nft"
      url="GIK"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
      emitevents="true"
    >
      <a-cylinder position="0 0.5 0" color="#FFA500"></a-cylinder>
      <a-text value="GIK" position="0 1.5 0" align="center" color="#ffffff" width="3"></a-text>
    </a-nft>

    <!-- Traveller object -->
    <a-entity id="traveller">
      <a-icosahedron radius="0.3" color="#FF00FF" opacity="0.95"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 1800; easing: linear;">
      </a-icosahedron>
    </a-entity>

    <!-- Connector line -->
    <a-entity id="connector"></a-entity>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    var THRESHOLD  = 1.0;
    var LERP_SPEED = 0.03;
    var LINE_COLOR = '#00FFFF';
    var LINE_WIDTH = 0.04;

    var nft1      = document.getElementById('nft1');
    var nft2      = document.getElementById('nft2');
    var traveller = document.getElementById('traveller');
    var connector = document.getElementById('connector');
    var distSpan  = document.getElementById('distValue');
    var statusMsg = document.getElementById('statusMsg');
    var dot1      = document.getElementById('dot1');
    var dot2      = document.getElementById('dot2');
    var barFill   = document.getElementById('barFill');

    var visibility = { nft1: false, nft2: false };

    nft1.addEventListener('markerFound', function() { visibility.nft1 = true;  dot1.classList.add('on'); });
    nft1.addEventListener('markerLost',  function() { visibility.nft1 = false; dot1.classList.remove('on'); });
    nft2.addEventListener('markerFound', function() { visibility.nft2 = true;  dot2.classList.add('on'); });
    nft2.addEventListener('markerLost',  function() { visibility.nft2 = false; dot2.classList.remove('on'); });

    var lineMesh = null;
    function showLine(p1, p2) {
      var mid  = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      var dist = p1.distanceTo(p2);
      var dir  = new THREE.Vector3().subVectors(p2, p1).normalize();
      if (!lineMesh) {
        var geo  = new THREE.CylinderGeometry(LINE_WIDTH, LINE_WIDTH, 1, 8);
        var mat  = new THREE.MeshBasicMaterial({ color: LINE_COLOR });
        lineMesh = new THREE.Mesh(geo, mat);
        connector.object3D.add(lineMesh);
      }
      lineMesh.visible = true;
      lineMesh.position.copy(mid);
      lineMesh.scale.set(1, dist, 1);
      lineMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    }
    function hideLine() { if (lineMesh) lineMesh.visible = false; }

    var tPos = new THREE.Vector3(), tReady = false, tTarget = null;
    function moveTraveller(p1, p2, dist) {
      if (!tReady) { tPos.copy(p1); tReady = true; }
      if (dist < THRESHOLD) {
        if (!tTarget) tTarget = 'nft2';
        var target = (tTarget === 'nft2') ? p2 : p1;
        tPos.lerp(target, LERP_SPEED);
        traveller.object3D.position.copy(tPos);
        if (tPos.distanceTo(target) < 0.06) {
          tTarget = (tTarget === 'nft2') ? 'nft1' : 'nft2';
        }
        statusMsg.textContent = 'Travelling! ' + dist.toFixed(2) + ' m';
        statusMsg.style.color = '#FF00FF';
      } else {
        traveller.object3D.position.copy(p1);
        tTarget = null;
        statusMsg.textContent = 'Move closer than ' + THRESHOLD + ' m';
        statusMsg.style.color = '#fff';
      }
    }

    function updateBar(dist) {
      var pct = Math.max(0, Math.min(100, (1 - dist / (THRESHOLD * 2)) * 100));
      barFill.style.width = pct + '%';
      barFill.style.background = pct > 60 ? '#e74c3c' : pct > 30 ? '#f39c12' : '#2ecc71';
    }

    function update() {
      if (visibility.nft1 && visibility.nft2) {
        var p1 = new THREE.Vector3();
        var p2 = new THREE.Vector3();
        nft1.object3D.getWorldPosition(p1);
        nft2.object3D.getWorldPosition(p2);
        var dist = p1.distanceTo(p2);
        distSpan.textContent = dist.toFixed(3);
        updateBar(dist);
        showLine(p1, p2);
        moveTraveller(p1, p2, dist);

      } else if (visibility.nft1 || visibility.nft2) {
        distSpan.textContent = '--';
        hideLine();
        barFill.style.width = '0%';
        tReady = false;
        statusMsg.textContent = 'Waiting for both markers…';
        statusMsg.style.color = '#f39c12';

      } else {
        distSpan.textContent = '--';
        hideLine();
        barFill.style.width = '0%';
        tReady = false;
        statusMsg.textContent = 'Searching…';
        statusMsg.style.color = '#fff';
      }
    }

    setInterval(update, 100);
  </script>
</body>
</html>
